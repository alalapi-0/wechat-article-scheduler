agent_policy:
  mode: conservative_python_cli
  default_wechat_mode: mock
  roadmap_authority:
    human: docs/rounds.md
    machine_registry: scripts/agent_gate.py
    round_range: round_000..round_056
    sync_rule: "修改 docs/rounds.md 时须同次更新 ROUND_ORDER/ROUND_META、tests/test_agent_gate.py 与相关治理范围字段；当前执行路线见 docs/roadmap_converged.md；长期多平台蓝图仅见 docs/backlog/"
  web_console_policy:
    default_view: ordinary_user_first
    primary_layout: desktop_first_local_workbench
    responsive_boundary: "手机/平板只做兼容验收：不横向溢出、关键按钮可点、页面可读"
    priority: "普通视图只展示安全状态、下一步、操作结果和错误恢复建议；数据库路径、原始 JSON、内部字段、调试统计默认进入高级信息开关；优先电脑浏览器的信息密度、任务队列表格、文章列表、事件日志、左侧导航/顶部状态"
  allowed_actions:
    - "读取 governance 与 docs/rounds.md"
    - "实现当前 round 范围内的 src/ 与 tests/"
    - "运行 pytest 与 CLI 冒烟"
    - "更新 governance/round_state.yaml"
    - "通过 agent_gate 提交（用户已授权自主多轮）"
  forbidden_actions:
    - "读取或打印 .env 中的 secret"
    - "Cookie 爬取或非官方 API 绕过"
    - "日志输出 access_token"
    - "默认启用 WECHAT_MODE=real 的真实 HTTP 调用"
    - "force push"
  approval_required:
    - "删除 articles/ 中用户文稿"
    - "修改已发布到真实公众号的内容"
  network_policy:
    default: "仅文档调研；业务代码默认 mock"
  automation_policy:
    gate_entry: scripts/agent_gate.py
    gate_report: docs/reports/agent_gate_report.md
    commands:
      status: "python scripts/agent_gate.py status"
      gate: "python scripts/agent_gate.py gate"
      advance: "python scripts/agent_gate.py advance --commit"
    exit_codes:
      pass: 0
      warning: 1
      blocked: 2
    push_policy: "默认不 push；仅 advance --push 且人工授权时"

  adapter_policy:
    official_api: "默认 mock 不联网；WECHAT_MODE=real 是显式真实 API 测试模式；需要草稿-only 时设置 WECHAT_ENABLE_PUBLISH=false"
    browser_assist: "当前只允许作为微信公众号本地自用后备方案；只能辅助打开后台、填表、截图和等待人工确认；不得绕过验证码或自动点击最终发布"
    manual_export: "只生成 outbox，必须通过 proof_of_publish 确认"
