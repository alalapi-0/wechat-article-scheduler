<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>微信草稿 · 发布工作台</title>
<link rel="icon" href="/favicon.ico" type="image/png" />
<style>
  :root { --bg:#f4f5f7; --surface:#fff; --text:#1a1a1a; --muted:#6b7280; --line:#e5e7eb; --accent:#07c160; --accent-soft:#e8f8ef; --warn:#fff8e6; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"PingFang SC",sans-serif; background:var(--bg); color:var(--text); }
  .top { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:var(--surface); border-bottom:1px solid var(--line); }
  .top a { color:var(--accent); text-decoration:none; font-size:14px; }
  .wrap { max-width:960px; margin:0 auto; padding:22px 24px 48px; }
  .card { background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
  .warn { padding:10px 12px; border-radius:8px; background:var(--warn); color:#8a6d00; font-size:13px; margin-bottom:14px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { padding:8px 10px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; }
  .btn { font-size:13px; padding:6px 12px; border-radius:8px; border:1px solid var(--line); background:#fff; text-decoration:none; color:var(--text); display:inline-block; }
  .filters { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .filters button { font-size:12px; padding:4px 10px; border-radius:999px; border:1px solid var(--line); background:#fff; cursor:pointer; }
  .filters button.active { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); font-weight:600; }
</style>
</head>
<body>
<header class="top"><a href="/">← 返回工作台</a><a href="/#drafts">在工作台中查看</a></header>
<main class="wrap">
  <h1>微信草稿记录</h1>
  <p id="modeNote" class="warn" hidden></p>
  <div class="card">
    <div class="filters" id="draftFilters">
      <button type="button" class="active" data-df="all">全部</button>
      <button type="button" data-df="created">已创建</button>
    </div>
    <div id="draftsTable">加载中…</div>
  </div>
</main>
<script>
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
let draftFilter = 'all';
async function loadSummary(){
  try {
    const s = await (await fetch('/api/drafts-summary')).json();
    const n = document.getElementById('modeNote');
    if (s.mode_note) { n.textContent = s.mode_note; n.hidden = false; }
  } catch(e){}
}
async function loadDrafts(){
  const url = draftFilter === 'all' ? '/api/drafts?limit=80' : '/api/drafts?limit=80&status=created';
  const rows = await (await fetch(url)).json();
  if (!rows.length) {
    document.getElementById('draftsTable').innerHTML = '<p style="color:var(--muted);">暂无草稿记录。执行到点发布（演练）后会出现在这里。</p>';
    return;
  }
  const body = rows.map(d => `<tr>
    <td>${esc(d.title||'（无标题）')}</td>
    <td>${esc(d.created_at_label)}</td>
    <td>${esc(d.media_id_label)}</td>
    <td>${esc(d.status_label)}</td>
    <td><a class="btn" href="${esc(d.article_detail_url)}">作品详情</a></td>
  </tr>`).join('');
  document.getElementById('draftsTable').innerHTML =
    `<table><thead><tr><th>作品</th><th>创建时间</th><th>草稿 ID</th><th>状态</th><th>操作</th></tr></thead><tbody>${body}</tbody></table>`;
}
document.getElementById('draftFilters').querySelectorAll('button[data-df]').forEach(btn => {
  btn.addEventListener('click', async () => {
    draftFilter = btn.getAttribute('data-df');
    document.querySelectorAll('#draftFilters button[data-df]').forEach(b => b.classList.toggle('active', b===btn));
    await loadDrafts();
  });
});
loadSummary(); loadDrafts();
</script>
</body>
</html>
