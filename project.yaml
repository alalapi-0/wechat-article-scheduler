project:
  name: wechat-article-scheduler
  type: python_cli_project
  status: active
  owner: user
  primary_language: zh-CN
  output_language: zh-CN
  current_stage: converged_phase1_round4
  current_round: round_061
  summary: 个人本地微信公众号发布工作台；当前 P0 只服务微信公众号闭环，其他平台全部进入后期 backlog。
  long_term_goal: 阶段一先稳定微信公众号文章导入、预览、封面、草稿、排期、scheduler、人工确认和可选正式发布；阶段二以后才评估文本、图文/视频、音频/音乐平台扩展。
repository:
  entry_points:
    human:
    - README.md
    - docs/user_manual.md
    - docs/roadmap_converged.md
    agent:
    - AGENTS.md
    - governance/repo_protocol_standard.yaml
    - governance/round_state.yaml
    runtime:
    - python -m wechat_article_scheduler.cli
  authoritative_files:
    cross_repo_standard: governance/repo_protocol_standard.yaml
    project_identity: project.yaml
    current_round_state: governance/round_state.yaml
    current_agent_policy: governance/agent_policy.yaml
    current_file_roles: governance/file_role_map.yaml
    roadmap: docs/rounds.md
    current_execution_roadmap: docs/roadmap_converged.md
    long_term_backlog_roadmap: docs/backlog/roadmap_40_rounds.md
    round_registry: scripts/agent_gate.py
protocol_standard:
  version: 0.3.0
  source_repo: novel-continuation-agent
  project_overrides:
  - field: project_specific_extensions.novel_pipeline
    reason: 非小说专用生成管线项目，无 novel_pipeline_contract；本仓库只保留通用治理思想。
    owner: user
  - field: agent_policy_standard.automation_policy
    reason: agent_gate 编排 round_000..round_061 与 pytest/CLI 冒烟，须与 docs/rounds.md 同步。
    owner: agent
  - field: data_policy_standard.review_workbench_policy
    reason: 本仓库当前公众号链路无内容审核；未来 review/proof 仅用于 browser_assist/manual_export 的人工确认。
    owner: agent
  - field: project_specific_extensions.wechat_article_scheduler.current_p0
    reason: Round 56 已将当前路线收敛为个人本地微信公众号发布工作台；多平台设计仅保留为 backlog。
    owner: agent
