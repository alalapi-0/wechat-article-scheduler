        - heading "公众号正文预览" [level=2] [ref=e49]
        - paragraph [ref=e50]: 以下为本地渲染的近似公众号正文预览，不等同于微信后台编辑器；标题单独显示在公众号标题栏。
        - generic [ref=e52]: 标题或重复首行
        - generic [ref=e53]:
          - paragraph [ref=e54]: 发售纪念SS 麒麟儿3
          - paragraph [ref=e55]:
            - text: 译者说明：本译文为駄犬老师作品《是谁杀死了勇者》的个人翻译，出于学习、整理与个人阅读目的制作。原文出处：
            - link "https://ncode.syosetu.com/n1052ib/20/" [ref=e56] [cursor=pointer]:
              - /url: https://ncode.syosetu.com/n1052ib/20/
            - text: 。并非官方译文；如需转载、引用或公开发布，请遵守原作者与原平台的版权规则。
          - paragraph [ref=e57]:
            - text: 隣村は壊滅的な被害を被っていた。無数の魔物たちが村の中を跋扈している。
            - text: 邻村遭受了毁灭性的破坏。无数魔物在村中横行。
          - paragraph [ref=e58]:
            - text: 人の叫び声と家屋が崩壊する音がいくつも聞こえてきた。
            - text: 人的惨叫声与房屋崩塌的声音接连传来。
          - paragraph [ref=e59]:
            - text: 助けようにも魔物の数が多すぎて、もはや手の出しようがない。
            - text: 就算想救人，魔物数量也太多，已经无从下手。
          - paragraph [ref=e60]:
            - text: アレスは素早く隣村のことを見捨てる判断を下した。滅びつつある村よりも、自分の村に緊急事態を知らせるべきだと冷徹に考えたのだ。
            - text: 亚雷斯迅速做出了舍弃邻村的判断。他冷静地认为，比起正在灭亡的村子，更应该把紧急事态告知自己的村子。
          - paragraph [ref=e61]:
            - text: （何故、誰もタリズ村に逃げてこなかったんだ？ いざというときは連絡するという段取りもつけていたはずなのに）
            - text: （为什么没有人逃到塔利兹村？明明也约好了万一有事就来联络。）
          - paragraph [ref=e62]:
            - text: アレスの疑問は、馬を返してタリズ村に戻ろうとした瞬間に氷解した。
            - text: 亚雷斯的疑问，在他调转马头、准备返回塔利兹村的瞬间冰消瓦解。
          - paragraph [ref=e63]:
            - text: 後方に異形の男が立っていたのだ。
            - text: 一个异形的男人站在后方。
          - paragraph [ref=e64]:
            - text: 紫の肌に隆々とした肉体、人の倍の長さはあるであろう耳、そして真っ赤な瞳。
            - text: 紫色皮肤，隆起的强壮肉体，大概有人类两倍长的耳朵，以及鲜红的眼睛。
          - paragraph [ref=e65]:
            - text: 魔人である。以前、アレスが倒した魔人とは纏っている空気が別物で、格上の存在であることが見て取れた。
            - text: 那是魔人。与过去被亚雷斯打倒的魔人相比，它身上缠绕的气息完全不同，一眼就能看出是更高位的存在。
          - paragraph [ref=e66]:
            - text: アレスは馬を降りた。剣と魔法を使いこなす魔人を相手に、馬上による有利はない。むしろ、戦いに巻き込んで馬を失えば、村に危険を知らせに行く時間が遅れる。それをアレスは恐れた。
            - text: 亚雷斯下了马。面对精通剑与魔法的魔人，骑在马上并没有优势。倒不如说，若是把马卷入战斗而失去它，就会耽误回村示警的时间。亚雷斯惧怕的是这一点。
          - paragraph [ref=e67]:
            - text: 「おまえが村人たちの退路を塞いでいたんだな、魔人」
            - text: “是你堵住了村民们的退路吧，魔人。”
          - paragraph [ref=e68]:
            - text: アレスは腰の剣を抜いた。アレスの家に伝わる家宝の一振りである。鉄ではない特別な金属で作られたものだったが、それが何であるのかは不明だった。だが何を切っても刃こぼれひとつしたことがない。
            - text: 亚雷斯拔出腰间的剑。那是亚雷斯家传的宝剑。它并非由铁，而是由某种特殊金属打造而成，具体是什么却无人知晓。然而无论斩开什么，剑刃都从未崩过一处。
          - paragraph [ref=e69]:
            - text: 「ほう、俺を見て怯えぬとは、人間にしては肝が据わっているな」
            - text: “哦，见了我还不害怕，作为人类倒是胆量不错。”
          - paragraph [ref=e70]:
            - text: 魔人は口の端を吊り上げると、見たこともないような巨大な大剣を両手に構えた。
            - text: 魔人扬起嘴角，双手握住一柄从未见过的巨大大剑。
          - paragraph [ref=e71]:
            - text: それに対してアレスは小声で呪文の詠唱を始めた。呪文が発動する最低限の声の大きさは、何度も試して検証済みである。相手に気取られずに呪文を唱えるために。
            - text: 与之相对，亚雷斯开始低声吟唱咒文。发动咒文所需的最低音量，他早已反复测试确认过。为的就是在不让对手察觉的情况下施法。
          - paragraph [ref=e72]:
            - text: 魔人が動こうとしたその瞬間、アレスは左手をかざした。
            - text: 魔人正要行动的瞬间，亚雷斯抬起左手。
          - paragraph [ref=e73]:
            - text: 「火よ！」
            - text: “火啊！”
          - paragraph [ref=e74]:
            - text: それは初歩の魔法。魔人相手に大したダメージは期待できないが、牽制には十分だった。
            - text: 那只是初级魔法。面对魔人并不能期待多大伤害，但用来牵制已经足够。
          - paragraph [ref=e75]:
            - text: 顔に向かって放たれた魔法を、魔人は反射的に避ける。すかさずアレスは踏み込んだ。
            - text: 朝脸部射去的魔法，让魔人反射性地闪避。亚雷斯立刻踏入对方怀中。
          - paragraph [ref=e76]:
            - text: 極限まで無駄を省いた鋭い斬撃。それは長年の修練の賜物。
            - text: 锐利的斩击将一切多余动作压缩到极限。那是多年修炼的成果。
          - paragraph [ref=e77]:
            - text: 魔人は大剣で辛うじて防いだが、続けざまにアレスに攻撃を仕掛けられて攻撃の手を封じられた。
            - text: 魔人勉强以大剑挡下，却被亚雷斯连续不断地抢攻，封住了进攻的手段。
          - paragraph [ref=e78]:
            - text: 力は圧倒的に魔人が有利なはずだが、その力を活かすことができない。
            - text: 力量上本应是魔人拥有压倒性优势，可它无法发挥这份力量。
          - paragraph [ref=e79]:
            - text: アレスはザックと共に、魔人を想定した模擬戦を何度も繰り返してきた。それが今実を結んでいる。
            - text: 亚雷斯曾与扎克一起，反复进行以魔人为假想敌的模拟战。而那一切，如今结出了果实。
          - paragraph [ref=e80]:
            - text: 魔人は剣を振り上げることさえできない。あらゆる隙を狙って、剣を差し込んでくるような攻撃を受けた。速い、というより上手い。
            - text: 魔人连把剑挥起都做不到。亚雷斯的攻击像是瞄准一切缝隙，把剑锋插入其中。与其说快，不如说精妙。
          - paragraph [ref=e81]:
            - text: 「おのれ！ ちょこまかと！」
            - text: “可恶！窜来窜去的！”
          - paragraph [ref=e82]:
            - text: 魔人は焦りを感じていた。この魔人とて、過去に戦場で何人も人間の戦士を屠ってきた猛者である。むしろ、こんな辺境の地に派遣されたことを不満に思っていたくらいだが、目の前の若い人間はモノが違った。
            - text: 魔人感到了焦躁。这名魔人过去也曾在战场上屠杀过许多人类战士，是个猛者。甚至不如说，它原本还对被派到这种边境之地感到不满。然而眼前这个年轻人不同。
          - paragraph [ref=e83]:
            - text: （強い。俺たちを相手にした戦い方を練り上げている）
            - text: （很强。他已经钻研出如何与我们战斗。）
          - paragraph [ref=e84]:
            - text: 力が強いわけではない。魔力が高いわけではない。その戦い方には澄んだ知性を感じさせた。
            - text: 并不是力量强大。也不是魔力高超。那种战斗方式里，有一种澄澈的知性。
          - paragraph [ref=e85]:
            - text: 魔人の身体に細かい傷が刻まれていく。人間の攻撃はなかなか終わらない。どれだけ鍛えればそんな体力がつくのだろうか？ 瞠目すべき敵だった。
            - text: 魔人的身体上逐渐刻下细小伤痕。人类的攻击久久不止。究竟要锻炼到什么程度，才能拥有这样的体力？这是一个值得瞠目的敌人。
          - paragraph [ref=e86]:
            - text: 魔人は必死に耐えた。人間相手にこんな屈辱は初めてである。
            - text: 魔人拼命忍耐。面对人类遭受这样的屈辱，还是第一次。
          - paragraph [ref=e87]:
            - text: 「……おまえは勇者か？」
            - text: “……你是勇者吗？”
          - paragraph [ref=e88]:
            - text: 長い攻撃を耐え抜いた後に魔人は問いかけた。お互いに息を切らしている。しかし、アレスに傷は無く、魔人は無数の手傷を負っていた。
            - text: 承受了漫长的攻击之后，魔人问道。双方都喘着气。然而亚雷斯毫发无伤，魔人身上却已留下无数伤口。
          - paragraph [ref=e89]:
            - text: 「違う」
            - text: “不是。”
          - paragraph [ref=e90]:
            - text: アレスは即座に否定した。自分がそうでないことは、アレスが一番よくわかっていた。幼い頃から自分は何でもできた。優秀であることは自覚している。けれど、心は凡庸だった。普通の人間の域を出ない。自分の狡い部分も悪い部分も知っている。人間としては当たり前だった。
            - text: 亚雷斯立刻否定。亚雷斯比谁都清楚，自己并非那样的人。从小到大，他什么都做得到。他也自觉优秀。可是他的心很平凡，没有超出普通人的范围。他知道自己狡猾的部分，也知道自己恶劣的部分。作为人类，那些都再正常不过。
          - paragraph [ref=e91]:
            - text: ところが、そうではない人間が近くにいた。純粋に星を追い求められるような人間が。
            - text: 然而，他身边有一个并非如此的人。一个能纯粹地追逐星辰的人。
          - paragraph [ref=e92]:
            - text: その在り方を見て、勇者とは恐らく心の形を指し示すものなのだろうと、アレスは考えていた。
            - text: 看着那样的存在，亚雷斯想，所谓勇者，大概指的是心的形状。
          - paragraph [ref=e93]:
            - text: 脳裏にしばらく会っていない従兄弟の顔が思い浮かび、口の端で笑う。
            - text: 许久未见的堂兄弟的脸浮现在脑海中，他嘴角露出笑意。
          - paragraph [ref=e94]:
            - text: 「勇者は別にいる。人間をなめるな、魔人」
            - text: “勇者另有其人。别小看人类，魔人。”
          - paragraph [ref=e95]:
            - text: その言葉を受けて魔人は覚悟を決めた。人間の話を信じたわけではない。だが、その強い意志に畏れを感じたのだ。しかも、状況は極めて不利。魔法を唱える暇も与えられない。
            - text: 听到这句话，魔人下定了决心。它并不是相信了人类的话。然而，它确实从那强烈的意志中感到畏惧。而且，局势极为不利。对方连吟唱魔法的空隙都不给它。
          - paragraph [ref=e96]:
            - text: 恐らく、命を引き換えにしなければ勝てないだろう。
            - text: 恐怕，不以性命相搏就无法取胜。
          - paragraph [ref=e97]:
            - text: 魔人は大剣を横に構えた。アレスも呼吸を抑えて正眼に構えている。
            - text: 魔人将大剑横在身侧。亚雷斯也压低呼吸，以正眼架势相对。
          - paragraph [ref=e98]:
            - text: 緊迫した時間がわずかに流れ、魔人が力任せに大剣を横に振るった。剛剣である。とても剣で受けられるような一撃ではない。
            - text: 紧迫的时间短暂流过，随后魔人以蛮力横挥大剑。那是刚猛的一击，绝非能用剑承受的斩击。
          - paragraph [ref=e99]:
            - text: アレスは後ろに跳んでそれをかわすと、間髪入れずに、がら空きになった魔人の懐に突っ込んだ。
            - text: 亚雷斯向后跃开避过这一击，随即毫不迟疑地冲进魔人门户大开的怀中。
          - paragraph [ref=e100]:
            - text: ところが魔人はそのまま大剣を投げ捨てると、鋭い爪と牙を剥きだしにしてアレスに飛びかかった。その姿は野生の獣を思い起こさせた。
            - text: 然而魔人就那样抛下大剑，露出锋利爪牙，朝亚雷斯扑来。那姿态令人想起野兽。
          - paragraph [ref=e101]:
            - text: 袈裟懸けに迫るアレスの斬撃を避けようともしない。すべてをかなぐり捨てていた。
            - text: 它甚至没有试图躲开亚雷斯斜斩而来的剑。它已经舍弃了一切。
          - paragraph [ref=e102]:
            - text: アレスの剣が魔人の首と肩の間を斬り裂いた。致命傷である。しかし、それでも魔人は止まらない。
            - text: 亚雷斯的剑切开魔人的颈肩之间。那是致命伤。可即便如此，魔人仍未停下。
          - paragraph [ref=e103]:
            - text: 予想外の魔人の行動に、アレスの顔に初めて恐怖が浮かぶ。間近に魔人の爪と牙が迫っていた。避けようもない。
            - text: 面对魔人出乎预料的举动，亚雷斯脸上第一次浮现恐惧。魔人的爪牙近在眼前，已经避无可避。
          - paragraph [ref=e104]:
            - text: ──しかし、魔人はそこで止まった。目から光が消えている。
            - text: ——然而，魔人在那里停住了。它眼中的光消失了。
          - paragraph [ref=e105]:
            - text: ゆっくりと倒れ込んでくる魔人の身体をアレスは避けた。
            - text: 亚雷斯避开缓缓倒下的魔人身体。
          - paragraph [ref=e106]:
            - text: 魔人の後ろには剣を握った男が立っていた。その剣からは血が滴っている。魔人を背中から刺したのだろう。
            - text: 魔人身后站着一个握剑的男人。血从那柄剑上滴落。大概是他从背后刺穿了魔人。
          - paragraph [ref=e107]:
            - text: 髪が汚く伸びた、髭だらけの男だった。
            - text: 那是个头发脏乱地长着、满脸胡子的男人。
          - paragraph [ref=e108]:
            - text: 「誰だよ、おまえ？」
            - text: “你谁啊？”
          - paragraph [ref=e109]:
            - text: アレスが笑った。
            - text: 亚雷斯笑了。
          - paragraph [ref=e110]:
            - text: 「笑うなよ。髪と髭は長い方が暖かいんだ」
            - text: “别笑。头发和胡子长一点比较暖和。”
          - paragraph [ref=e111]:
            - text: 服もボロボロで近寄りがたい風貌をしていたが、その優しい目はザックであることを示していた。
            - text: 他的衣服也破破烂烂，模样让人难以靠近，但那双温柔的眼睛说明他就是扎克。
          - paragraph [ref=e112]:
            - text: 「どうやら間に合ったようだね」
            - text: “看来你赶上了。”
          - paragraph [ref=e113]:
            - text: 「もう少し余裕を持ってくれよ」
            - text: “拜托你下次再多留点余裕吧。”
          - paragraph [ref=e114]:
            - text: ふたりは抱き合って無事の再会を喜んだ。ザックの身体からは鼻をつくような臭いが漂っていたが、それがかえって彼の長い苦労をしのばせた。
            - text: 两人拥抱在一起，为平安重逢而喜悦。扎克身上散发出刺鼻的气味，却反而令人想到他经历过的漫长辛苦。
          - paragraph [ref=e115]:
            - text: 「村に戻って逃げる準備をしないとな。おまえは髭を剃って身体を洗え。魔物を防ぐための罠を仕掛けてあるから、それくらいの時間は稼げるさ」
            - text: “得回村准备逃走了。你先把胡子剃了，身体也洗一洗。我已经布下了阻挡魔物的陷阱，争取这点时间还是够的。”
          - paragraph [ref=e116]:
            - text: アレスがそう言うと、ザックは自分の身体の臭いを嗅いだ。
            - text: 亚雷斯这样说后，扎克闻了闻自己的身体。
          - paragraph [ref=e117]:
            - text: 「そんなに臭うかな？」
            - text: “有那么臭吗？”
          - paragraph [ref=e118]:
            - text: 「今のおまえなら、魔物の仲間になれるよ」
            - text: “现在的你，完全可以混进魔物群里。”
          - paragraph [ref=e119]:
            - text: アレスが肩をすくめた。
            - text: 亚雷斯耸了耸肩。
          - paragraph [ref=e120]:
            - text: ──
            - text: ——
          - paragraph [ref=e121]:
            - text: ザックはアレスと入れ違いにタリズ村に戻ってきたのだが、その汚い風貌から、村人たちはすぐにザックだとわからなかった。
            - text: 扎克与亚雷斯错身回到了塔利兹村，但因为那副邋遢的模样，村民们没能立刻认出他。
          - paragraph [ref=e122]:
            - text: その後、アレスが馬に乗って隣村に行ったことをザックは聞くと、自分も馬を借りて駆け付けて、アレスを助けたのだった。
            - text: 之后，扎克听说亚雷斯骑马去了邻村，便也借了马赶去，救下了亚雷斯。
          - paragraph [ref=e123]:
            - text: ふたりはタリズ村に戻ると、隣村が壊滅したことを報告した。しかも魔人まで現れたと。
            - text: 两人回到塔利兹村后，报告了邻村已经毁灭的事。而且连魔人也出现了。
          - paragraph [ref=e124]:
            - text: それを聞いた村人たちは、慌てて逃げる準備を始めた。その間にザックは水を浴び、髭を剃り、衣服を新しいものにした。
            - text: 听到这些，村民们慌忙开始准备逃离。与此同时，扎克冲洗身体、剃掉胡子，换上了新的衣服。
          - paragraph [ref=e125]:
            - text: 「良い場所を見つけたよ。森の中にあって開けた場所だ。近くに川も流れている。身を隠すにはちょうど良いところだよ。住み心地もタリズ村の次くらいには良い」
            - text: “我找到好地方了。那是一片森林里的开阔地。附近还有河流。很适合藏身，住起来也只比塔利兹村差一点。”
          - paragraph [ref=e126]:
            - text: ザックのその言葉に、村長であるアレスの父は出発を決めた。魔物たちが近くに迫っていることも確認されている。魔人を倒したことで統率はとれていないが、そのうち村を襲うことは目に見えていた。あまりの数に、戦いを挑むことが無謀なのは明らかである。
            - text: 听了扎克的话，身为村长的亚雷斯父亲决定出发。魔物已经逼近附近这一点也得到了确认。虽然击败魔人后，魔物失去了统率，但它们迟早会袭击村子，这是显而易见的。数量太多，挑战它们显然是鲁莽之举。
          - paragraph [ref=e127]:
            - text: アレスの仕掛けた罠にかかった魔物たちの咆哮が響いた。すぐ近くにいる。
            - text: 落入亚雷斯所设陷阱的魔物们发出咆哮。它们就在很近的地方。
          - paragraph [ref=e128]:
            - text: あれだけ腰の重かった村人たちは、我先にとザックが指し示した道へと急いだ。
            - text: 那些曾经迟迟不肯动身的村民，如今争先恐后地朝扎克指示的道路赶去。
          - paragraph [ref=e129]:
            - text: 誰ひとり欠けることなく、村人たちは長い旅へと赴いたのだった。
            - text: 没有缺少任何一人，村民们踏上了漫长的旅途。
          - paragraph [ref=e130]:
            - text: ──
            - text: ——
          - paragraph [ref=e131]:
            - text: 様々な苦労はあったものの、長い時間をかけて準備をしていただけあって、村人たちの旅は順調といえた。不平不満が無いわけではないが、途中でいくつもの街や村が破壊されている有様を見て、アレスの判断の正しさを知った。
            - text: 虽然遭遇了种种辛苦，但毕竟花了很长时间准备，村民们的旅程可以说相当顺利。并非没有怨言，可当他们看到沿途许多城镇和村庄被破坏的惨状后，终于明白亚雷斯的判断是正确的。
          - paragraph [ref=e132]:
            - text: 今、村人たちは小高い丘を越えようとしている。そこからは王都の城が遠くに見えた。
            - text: 此刻，村民们正要翻过一座小丘。从那里能远远看见王都的城堡。
          - paragraph [ref=e133]:
            - text: 火の手が上がっている。国が滅びようとしているのだろう。
            - text: 火光升起。这个国家恐怕正在走向灭亡。
          - paragraph [ref=e134]:
            - text: その有様に呆然と立ち尽くす村人たちも多かった。
            - text: 许多村民都被眼前的景象震慑，茫然地站在原地。
          - paragraph [ref=e135]:
            - text: 「王国が滅んだからといって、俺たちが滅ぶわけじゃない！」
            - text: “王国灭亡，并不代表我们也会灭亡！”
          - paragraph [ref=e136]:
            - text: アレスが村人たちを鼓舞した。
            - text: 亚雷斯鼓舞村民们。
          - paragraph [ref=e137]:
            - text: 「最後まで生き残ったほうが勝ちなんだ！ 魔人の数は少なく、世界中に目を光らせることはできない。今は人間が負けたかもしれないが、いつかタリズ村を取り戻せる日もやってくる！」
            - text: “能活到最后的一方才是胜者！魔人数量很少，不可能盯住整个世界。现在或许是人类输了，但总有一天，我们也能夺回塔利兹村！”
          - paragraph [ref=e138]:
            - text: その言葉に老人たちは力なく俯いたが、若者たちは目に強い意志を宿らせた。
            - text: 听到这句话，老人们无力地低下头，年轻人的眼中却燃起了强烈的意志。
          - paragraph [ref=e139]:
            - text: アレスは勇者ではなかった。しかし、人を惹きつける強い力を持っており、英雄となれる資質はあった。
            - text: 亚雷斯并不是勇者。然而，他拥有强烈吸引他人的力量，也具备成为英雄的资质。
          - paragraph [ref=e140]:
            - text: アレスのもとに若い力が集まり、いずれ魔人たちに逆襲する未来もあったかもしれない。
            - text: 或许曾有一个未来，年轻的力量聚集到亚雷斯麾下，终有一天向魔人们发起反攻。
          - paragraph [ref=e141]:
            - text: 隣に並ぶザックの頷く顔を見て、アレスは勇気を得た。
            - text: 看见并肩站在身旁的扎克点头，亚雷斯获得了勇气。
          - paragraph [ref=e142]:
            - text: 自分の言葉ほどには、アレスは自分のことを信じられない。けれど、ザックが信じてくれるなら、自分を信じることができると思っていた。
            - text: 亚雷斯并不像自己说出口的那些话一样相信自己。可是，只要扎克愿意相信他，他就觉得自己也能相信自己。
          - paragraph [ref=e143]:
            - text: 必ず人間は勝つと。
            - text: 人类一定会胜利。
          - paragraph [ref=e144]:
            - text: しかし、
            - text: 然而，
          - paragraph [ref=e145]:
            - text: 世界はそこで終わった。
            - text: 世界在那里终结了。
          - paragraph [ref=e146]:
            - text: ──
            - text: ——
          - paragraph [ref=e147]:
            - text: 麒麟児と呼ばれた少年がいた。勇者と呼ばれたこともあった。
            - text: 曾经有一个少年，被称为麒麟儿。也曾被称为勇者。
          - paragraph [ref=e148]:
            - text: 道半ばで倒れた彼の遺体は、今も見つかっていない。
            - text: 倒在半途的他的遗体，至今仍未被找到。