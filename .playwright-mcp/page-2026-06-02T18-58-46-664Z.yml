            - heading "帮助" [level=2] [ref=e128]
            - generic [ref=e129]: 快速理解
          - generic [ref=e130]:
            - paragraph [ref=e131]: 这是什么？ 一个把本地文章批量发布到微信公众号的工作台。顶部状态条显示当前模式：演练（不联网）、真实连接仅草稿、或真实发布（需二次确认）。
