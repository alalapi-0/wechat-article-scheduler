            - paragraph [ref=e130]: 这是什么？ 一个把本地文章批量发布到微信公众号的工作台。顶部状态条显示当前模式：演练（不联网）、真实连接仅草稿、或真实发布（需二次确认）。
            - paragraph [ref=e131]: 怎么用？ ① 上传文章和封面 → ② 安排发布时间 → ③ 到时间后执行到点发布。
            - paragraph [ref=e132]:
              - text: 真实 API（高级） 在
              - code [ref=e133]: .env
              - text: 设
              - code [ref=e134]: WECHAT_MODE=real
              - text: 与公众号凭证；推荐
              - code [ref=e135]: WECHAT_ENABLE_PUBLISH=false
              - text: 仅测草稿。命令行验证：
              - code [ref=e136]: python3 scripts/real_api_check.py --samples 3
              - text: （报告在
              - code [ref=e137]: reports/real_api_runs/
              - text: ）。
            - paragraph [ref=e138]:
              - text: 更多见
