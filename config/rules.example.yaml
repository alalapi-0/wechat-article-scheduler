# 去重与扫描规则（复制为 config/rules.yaml 后按需修改）

dedupe:
  # 按 content_hash 去重；若已存在相同 hash 的 imported 文章则跳过
  by_content_hash: true
  # 标题规范化后比对（小写、去空白）
  by_normalized_title: true

scan:
  extensions: [".md", ".txt", ".html"]
  # 摘要最大长度（从正文截取）
  summary_max_chars: 120

schedule:
  # 默认每天最多排多少篇
  max_per_day: 2
  # 两篇之间最少间隔（小时）
  min_hours_between: 4
  # 首选发布时间（24h，本地时区）
  preferred_hours: [9, 14, 20]

publish:
  # draft = 仅进草稿箱；publish = 到点正式发布（即使 WECHAT_ENABLE_PUBLISH=false 也可按任务覆盖）
  default_action: draft
  auto_execute: false
  need_open_comment: false
  only_fans_can_comment: false
  author: ""
  content_source_url: ""
