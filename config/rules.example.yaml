# 去重与扫描规则（复制为 config/rules.yaml 后按需修改）

dedupe:
  # 按 content_hash 去重；若已存在相同 hash 的 imported 文章则跳过
  by_content_hash: true
  # 标题规范化后比对（小写、去空白）
  by_normalized_title: true

scan:
  extensions: [".md", ".txt", ".html"]
  # 摘要最大长度（从正文截取）
  summary_max_chars: 120

schedule:
  # 默认每天最多排多少篇
  max_per_day: 2
  # 两篇之间最少间隔（小时）
  min_hours_between: 4
  # 首选发布时间（24h，本地时区）
  preferred_hours: [9, 14, 20]
  # 可选：自动 plan 向前看多少天（合集 collection.yaml 可再覆盖 window_days）
  # window_days: 14

# 合集级排期见 content/collections/*/collection.yaml 的 schedule 块（docs/collection_schedule_rules.md）

publish:
  # draft = 按时创建草稿；publish = 历史值，当前只表示草稿后需人工后台发布
  default_action: draft
  auto_execute: false
  need_open_comment: false
  only_fans_can_comment: false
  author: ""
  content_source_url: ""

manual_export:
  # 通用 outbox 导出根目录（可用 MANUAL_EXPORT_OUTBOX 覆盖；测试隔离时建议单独子目录）
  outbox_dir: "outbox"

external_agent:
  enabled: true
  outbox_dir: "outbox/wechat_agent_tasks"
  include_article_preview: true
  include_article_source: true
  include_cover: true
  include_prompt: true
  include_checklist: true
  include_proof_template: true
  redact_sensitive_values: true

internal_browser_agent:
  enabled: false
  note: "This project does not implement internal browser automation by default."

internal_llm_agent:
  enabled: false
  note: "This project does not require LLM for normal WeChat draft workflow."
